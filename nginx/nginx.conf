# Docker internal DNS — enables dynamic upstream resolution
resolver 127.0.0.11 valid=10s;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name masashi-enokida-hp.xvps.jp;

    # Let's Encrypt challenge (renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name masashi-enokida-hp.xvps.jp;

    ssl_certificate     /etc/letsencrypt/live/masashi-enokida-hp.xvps.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/masashi-enokida-hp.xvps.jp/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;

    # Backend API — all under /api/ prefix
    location /api/ {
        set $backend_upstream http://backend:4000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (direct, no /api prefix)
    location /health {
        set $backend_upstream http://backend:4000;
        proxy_pass $backend_upstream/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO storage (blog images etc.)
    location /storage/ {
        set $minio_upstream http://minio:9000;
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass $minio_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin console
    location /admin {
        set $admin_upstream http://admin-console:3001;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Frontend (default — all other routes)
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
